<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="download.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PES 2026 — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">PES<span>2026</span></div>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contect.html" class="active">Contact</a></li>
      <li><a href="plus.html">More</a></li>
    </ul>
  </nav>

  <section class="contact-section">
    <div style="text-align:center; margin-bottom:50px;">
      <span class="hero-tag">Get In Touch</span>
      <h1 style="font-family:'Orbitron',sans-serif; font-size:2.5rem; font-weight:900; letter-spacing:3px; margin-top:16px;">CONTACT <span style="color:var(--green)">US</span></h1>
    </div>

    <div class="contact-box">
      <h1>SEND A <span>MESSAGE</span></h1>
      <p class="sub">Have a question or feedback? We'd love to hear from you.</p>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Your full name" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="your@email.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" placeholder="What's this about?" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Write your message here..." rows="5"
          style="background:var(--dark2); border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:12px 16px; color:#fff; font-family:'Rajdhani',sans-serif; font-size:1rem; outline:none; resize:vertical; width:100%; transition:border-color 0.25s;"
          onfocus="this.style.borderColor='var(--green)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.08)'"></textarea>
      </div>
      <button class="btn-primary" style="width:100%; margin-top:8px;">Send Message</button>
    </div>
  </section>

  <footer>
    <div class="footer-logo">PES<span>2026</span></div>
    <p>© 2026 eFootball. All rights reserved.</p>
    <div class="footer-links">
      <a href="home.html">Home</a>
      <a href="about.html">About</a>
      <a href="contect.html">Contact</a>
      <a href="plus.html">More</a>
    </div>
  </footer>

</body>
</html>
